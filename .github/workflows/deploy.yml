name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Mengizinkan penjalanan workflow secara manual dari tab Actions
  workflow_dispatch:

# Mengatur izin GITHUB_TOKEN untuk mengizinkan deployment ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Memastikan hanya satu deployment yang berjalan dalam satu waktu
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job tunggal untuk membangun aplikasi statis dan mendeploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        # Menjalankan seluruh perintah di dalam folder nextjs_version
        working-directory: ./nextjs_version
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./nextjs_version/package.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: npm install

      - name: Build and Static Export with Vite
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # PERBAIKAN: Vite React menghasilkan folder "dist", bukan "out"
          path: ./nextjs_version/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4